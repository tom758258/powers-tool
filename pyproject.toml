[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "keysight-power"
version = "0.1.0"
description = "Safe Python tools for controlling Keysight DC power supplies."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Keysight Power contributors" },
]
dependencies = [
  "pyvisa>=1.14",
  "tomli>=2; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
