name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version

      - name: Build distribution
        run: uv run python -m build

      - name: Inspect distribution
        run: uv run python tests/packaging/inspect_distribution.py dist

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version
