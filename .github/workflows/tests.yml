name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - Codex

jobs:
  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package keysight-powers

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run keysight-power --help
          uv run keysight-power-webui --help

      - name: Build distribution
        run: uv run python -m build

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package keysight-powers

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run keysight-power --help
          uv run keysight-power-webui --help
