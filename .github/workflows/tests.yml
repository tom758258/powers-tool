name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: CI quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR head or push commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check WebUI JavaScript syntax
        run: node --check src/powers_tool_webui/static/app.js

      - name: Check tracked text hygiene
        run: python scripts/check_text_hygiene.py

      - name: Check committed range whitespace
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          is_valid_commit() {
            git cat-file -e "$1^{commit}" 2>/dev/null
          }

          check_full_tree() {
            local empty_tree
            empty_tree="$(git hash-object -t tree /dev/null)"
            echo "Checking full tree for $1"
            git diff --check "$empty_tree" "$1"
          }

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            is_valid_commit "$PR_HEAD_SHA" || {
              echo "PR head SHA is not available: $PR_HEAD_SHA" >&2
              exit 1
            }
            if merge_base="$(git merge-base "$PR_BASE_SHA" "$PR_HEAD_SHA")"; then
              git diff --check "$merge_base" "$PR_HEAD_SHA"
            else
              echo "PR merge-base is unavailable; checking the full tree." >&2
              check_full_tree "$PR_HEAD_SHA"
            fi
          elif [[ "$EVENT_NAME" == "push" ]]; then
            is_valid_commit "$PUSH_SHA" || {
              echo "Push SHA is not available: $PUSH_SHA" >&2
              exit 1
            }
            if [[ "$PUSH_BEFORE" =~ ^0+$ ]] || ! is_valid_commit "$PUSH_BEFORE"; then
              echo "Push before SHA is unavailable; checking the full tree." >&2
              check_full_tree "$PUSH_SHA"
            else
              git diff --check "$PUSH_BEFORE" "$PUSH_SHA"
            fi
          else
            echo "Unsupported event for committed-range whitespace check: $EVENT_NAME" >&2
            exit 1
          fi

  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version

      - name: Build distribution
        run: uv run python -m build

      - name: Inspect distribution
        run: uv run python tests/packaging/inspect_distribution.py dist

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version

  wrapper-contracts:
    name: Windows validation wrapper contracts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run wrapper contracts
        run: uv run python -m pytest tests\cli\test_cli_wrappers.py tests\packaging\test_release_acceptance.py -q -p no:cacheprovider
