name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: CI quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR head or push commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check WebUI JavaScript syntax
        run: node --check src/powers_tool_webui/static/app.js

      - name: Check tracked text hygiene
        run: python scripts/check_text_hygiene.py

      - name: Check committed range whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: python scripts/check_changed_whitespace.py

  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version

      - name: Build distribution
        run: uv run python -m build

      - name: Inspect distribution
        run: uv run python tests/packaging/inspect_distribution.py dist

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run tests
        run: uv run python -m pytest tests -q -p no:cacheprovider

      - name: Smoke console scripts
        run: |
          uv run powers-tool --help
          uv run powers-tool-webui --help
          uv run powers-tool-webui-launcher --version

  wrapper-contracts:
    name: Windows validation wrapper contracts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Install package
        run: uv sync --locked --all-extras --reinstall-package powers-tool

      - name: Run wrapper contracts
        run: uv run python -m pytest tests\cli\test_cli_wrappers.py tests\packaging\test_release_acceptance.py -q -p no:cacheprovider
